<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADN de Recherche — Planning Intégré 2026</title>
<style>
  :root {
    --accent: #1a3c5e; --blue: #2471a3; --green: #1e8449; --orange: #d35400;

    --light: #eaf2f8; --lighter: #f8fbfd; --bg: #f4f6f9;
    --axe12: #2471a3; --axe3: #d35400; --formation: #1e8449; --veille: #6c3483; --enseignement: #148f77;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter','Segoe UI',system-ui,-apple-system,sans-serif; background: var(--bg); color: #2c3e50; padding: 16px; }
  .container { max-width: 1000px; margin: 0 auto; }

  /* Header */
  .header { background: linear-gradient(135deg, #0b2545 0%, #13508f 60%, #1e8449 100%); border-radius: 16px; padding: 30px 34px; margin-bottom: 20px; color: #fff; position: relative; overflow: hidden; }
  .header::after { content:''; position:absolute; top:-50px; right:-50px; width:220px; height:220px; background:rgba(255,255,255,0.03); border-radius:50%; }
  .header-eyebrow { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; opacity:0.55; margin-bottom:4px; }
  .header h1 { font-size:26px; font-weight:800; margin-bottom:4px; line-height:1.2; }
  .header-sub { font-size:15px; opacity:0.85; font-weight:300; margin-bottom:10px; }
  .header-meta { font-size:13px; opacity:0.8; display:flex; gap:6px; flex-wrap:wrap; }
  .header-meta span { display:inline-block; background:rgba(255,255,255,0.12); padding:3px 11px; border-radius:20px; }

  /* Global progress */
  .global-progress { background:#fff; border-radius:12px; padding:14px 20px; margin-bottom:16px; display:flex; gap:18px; align-items:center; flex-wrap:wrap; border:1px solid #e8e8e8; }
  .gp-bar-wrap { flex:1; min-width:200px; }
  .gp-label { font-size:12px; font-weight:600; color:#888; margin-bottom:4px; }
  .gp-bar { height:8px; background:#eee; border-radius:4px; overflow:hidden; }
  .gp-bar-fill { height:100%; border-radius:4px; transition:width 0.4s; background:linear-gradient(90deg,var(--blue),var(--green)); }
  .gp-stats { display:flex; gap:14px; }
  .gp-stat { text-align:center; }
  .gp-stat-num { font-size:20px; font-weight:800; }
  .gp-stat-label { font-size:10px; color:#999; text-transform:uppercase; letter-spacing:0.5px; }

  /* Day-cap banner */
  .daycap-banner { background:#fff; border:1px solid #d6eee6; border-left:4px solid var(--teal); border-radius:10px; padding:10px 16px; margin-bottom:16px; font-size:12px; color:#1f5c4e; display:flex; align-items:center; gap:8px; }

  /* Phases */
  .phases { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .phase-card { flex:1; min-width:180px; background:#fff; border-radius:12px; padding:12px 14px; border-left:4px solid; cursor:pointer; transition:box-shadow 0.2s,transform 0.15s; }
  .phase-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); transform:translateY(-1px); }
  .phase-card.active { box-shadow:0 4px 20px rgba(0,0,0,0.12); }
  .phase-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
  .phase-title { font-size:13px; font-weight:700; color:#333; margin-bottom:2px; }
  .phase-weeks { font-size:11px; color:#999; }

  /* Week tabs */
  .week-tabs { display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap; }
  .week-tab { flex:0 0 auto; min-width:52px; padding:8px 4px; border:2px solid #e0e0e0; border-radius:9px; cursor:pointer; background:#fff; text-align:center; transition:all 0.2s; position:relative; }
  .week-tab:hover { border-color:#bbb; }
  .week-tab.active { color:#fff; }
  .week-tab .wt-num { display:block; font-size:11px; font-weight:700; }
  .week-tab .wt-dates { display:block; font-size:8px; font-weight:500; opacity:0.6; margin-top:1px; }
  .week-tab .wt-progress { width:30px; height:3px; border-radius:2px; background:#eee; margin:3px auto 0; overflow:hidden; }
  .week-tab .wt-progress-bar { height:100%; border-radius:2px; transition:width 0.3s; }

  /* Week detail */
  .week-detail { background:#fff; border-radius:14px; border:1px solid #e8e8e8; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.04); }
  .week-header { padding:20px 26px; color:#fff; }
  .week-header-top { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  .week-header .wh-phase { font-size:11px; opacity:0.7; font-weight:600; letter-spacing:0.5px; }
  .week-header h2 { font-size:22px; font-weight:800; margin-top:3px; }
  .wh-badges { display:flex; gap:8px; flex-wrap:wrap; }
  .wh-badge { background:rgba(255,255,255,0.18); padding:4px 11px; border-radius:20px; font-size:12px; font-weight:500; }
  .wh-info { margin-top:10px; font-size:12.5px; opacity:0.92; line-height:1.55; }
  .wh-info strong { opacity:1; }
  .wh-milestone { margin-top:10px; background:rgba(255,255,255,0.15); border-radius:8px; padding:8px 14px; font-size:12px; font-weight:600; }

  /* Days & Tasks */
  .days-container { padding:16px 20px; }
  .day-group { margin-bottom:14px; }
  .day-label { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
  .day-label-date { font-weight:400; color:#aaa; font-size:11px; }
  .day-label-end { font-weight:600; color:var(--teal); font-size:10px; background:#e8f8f5; padding:1px 8px; border-radius:8px; }
  .task-row { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; margin-bottom:5px; border-radius:9px; border:1px solid; cursor:pointer; transition:all 0.15s; }
  .task-row:hover { box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .task-row.done { opacity:0.55; }
  .checkbox { width:20px; height:20px; border-radius:5px; border:2px solid #ccc; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; transition:all 0.2s; font-size:12px; color:#fff; font-weight:700; }
  .checkbox.checked { background:var(--green); border-color:var(--green); }
  .task-text { font-size:13px; font-weight:500; color:#333; line-height:1.4; }
  .task-row.done .task-text { color:#aaa; text-decoration:line-through; }
  .task-tags { display:flex; gap:5px; margin-top:4px; flex-wrap:wrap; }
  .tag { font-size:10px; padding:1px 8px; border-radius:10px; font-weight:600; }
  .tag-time { color:#888; background:#f5f5f5; }

  /* Notes section */
  .notes-section { margin-top:12px; padding:12px 16px; background:#fafbfc; border-radius:10px; border:1px dashed #ddd; }
  .notes-section label { font-size:11px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:4px; }
  .notes-section textarea { width:100%; min-height:60px; border:1px solid #e0e0e0; border-radius:6px; padding:8px 10px; font-family:inherit; font-size:12px; resize:vertical; background:#fff; color:#333; }
  .notes-section textarea:focus { outline:none; border-color:var(--blue); }

  /* Empty state */
  .empty-state { text-align:center; padding:40px 20px; color:#aaa; }
  .empty-state .icon { font-size:40px; margin-bottom:12px; }
  .empty-state h3 { font-size:15px; color:#888; margin-bottom:6px; }
  .empty-state p { font-size:12px; max-width:420px; margin:0 auto; line-height:1.6; }

  /* Legend */
  .legend { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
  .legend-item { font-size:10px; padding:3px 10px; border-radius:12px; border:1px solid; font-weight:600; }
  .footer-note { text-align:center; font-size:10px; color:#bbb; margin-top:12px; padding-bottom:16px; line-height:1.5; }

  /* Actions bar */
  .actions-bar { display:flex; gap:8px; margin-top:12px; justify-content:center; flex-wrap:wrap; }
  .btn { padding:7px 16px; border-radius:8px; border:1px solid #ddd; background:#fff; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.2s; color:#555; }
  .btn:hover { background:#f0f0f0; }
  .btn-danger { border-color:#e74c3c40; color:#c0392b; }
  .btn-danger:hover { background:#fdf2f2; }
  .btn-export { border-color:var(--blue); color:var(--blue); }

  @media print { body { background:#fff; padding:0; } .week-tabs,.phases,.global-progress,.actions-bar,.notes-section,.legend,.daycap-banner { display:none; } .week-detail { box-shadow:none; border:none; } }
  @media (max-width:600px) { body { padding:8px; } .header { padding:18px; } .header h1 { font-size:20px; } }
</style>
</head>

// ── STATE ──
let selectedWeek = 0;
let completed = {};
let notes = {};
try { const s=localStorage.getItem("adn_v3_tasks"); if(s) completed=JSON.parse(s); } catch(e){}
try { const s=localStorage.getItem("adn_v3_notes"); if(s) notes=JSON.parse(s); } catch(e){}

function saveTasks() { try { localStorage.setItem("adn_v3_tasks",JSON.stringify(completed)); } catch(e){} }
function saveNotes() { try { localStorage.setItem("adn_v3_notes",JSON.stringify(notes)); } catch(e){} }

function toggleTask(wi,di,ti) { const k=`${wi}-${di}-${ti}`; completed[k]=!completed[k]; saveTasks(); render(); }
function updateNote(wi,val) { notes[wi]=val; saveNotes(); }

function getProgress(wi) {
  const w=WEEKS[wi]; if(!w.days.length) return null;
  let t=0,d=0;
  w.days.forEach((day,di)=>day.tasks.forEach((_,ti)=>{t++; if(completed[`${wi}-${di}-${ti}`]) d++;}));
  return t?Math.round(d/t*100):0;
}

function getGlobalProgress() {
  let t=0,d=0;
  WEEKS.forEach((w,wi)=>w.days.forEach((day,di)=>day.tasks.forEach((_,ti)=>{t++; if(completed[`${wi}-${di}-${ti}`]) d++;})));
  return {total:t, done:d, pct: t?Math.round(d/t*100):0};
}

function selectWeek(i) { selectedWeek=i; render(); }

function resetAll() {
  if(!confirm("Réinitialiser toute la progression ? Cette action est irréversible.")) return;
  completed={}; notes={}; saveTasks(); saveNotes(); render();
}

function exportData() {
  const data = {completed, notes, exported: new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `adn_recherche_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function render() {
  const w = WEEKS[selectedWeek];
  const phase = PHASES.find(p=>p.id===w.phase);
  const gp = getGlobalProgress();

  let html = `
  <div class="header">
    <div class="header-eyebrow">ADN de Recherche et Stratégie Scientifique Intégrée</div>

      <span>📅 18 semaines</span><span>🎯 ICSE 2027 NIER — 23 oct.</span><span>📝 Paper #184 en review</span><span>🎓 Formation AI Portfolio</span><span>🕐 Journée bornée à 18h</span>
    </div>
  </div>

  <div class="daycap-banner">🕐 <strong>Règle de cadrage :</strong> chaque journée de travail (formation + recherche + enseignement) s'arrête à 18h, quelle que soit la charge de la semaine. Un bloc de 2h/jour (lundi–vendredi) est réservé à la préparation des cours et syllabus 2026-2027.</div>

    <div class="gp-stats">

    </div>
  </div>

  <div class="phases">`;

  PHASES.forEach(p=>{
    const active = w.phase===p.id;
    html+=`<div class="phase-card ${active?'active':''}" style="border-left-color:${p.color}" onclick="selectWeek(${p.range[0]})">
      <div class="phase-label" style="color:${p.color}">Phase ${p.id}</div>
      <div class="phase-title">${esc(p.label)}</div>

  html+=`</div><div class="week-tabs">`;

  WEEKS.forEach((wk,i)=>{
    const prog = getProgress(i);
    const active = i===selectedWeek;
    const col = PHASES.find(p=>p.id===wk.phase).color;
    const style = active ? `background:${col};border-color:${col};color:#fff` : '';
    html+=`<div class="week-tab ${active?'active':''}" style="${style}" onclick="selectWeek(${i})">

    <div class="week-header" style="background:${phase.color}">

      <div class="wh-info"><strong>Objectif :</strong> ${esc(w.objective)}</div>
      <div class="wh-info"><strong>Livrable :</strong> ${esc(w.deliverable)}</div>
      ${w.milestone?`<div class="wh-milestone">🏁 ${esc(w.milestone)}</div>`:''}
    </div>
    <div class="days-container">`;

  if(w.days.length) {
    w.days.forEach((day,di)=>{
      html+=`<div class="day-group"><div class="day-label"><span>${esc(day.label)}</span><span style="display:flex;gap:6px;align-items:center"><span class="day-label-date">${esc(day.date)}</span><span class="day-label-end">fin 18h</span></span></div>`;
      day.tasks.forEach((task,ti)=>{
        const k=`${selectedWeek}-${di}-${ti}`;
        const done=!!completed[k];
        const cs=CATS[task.cat]||CATS.admin;
        const borderC=done?'#d5f5e3':cs.border+'30';
        const bgC=done?'#f5faf6':cs.bg;
        html+=`<div class="task-row ${done?'done':''}" style="border-color:${borderC};background:${bgC}" onclick="toggleTask(${selectedWeek},${di},${ti})">
          <div class="checkbox ${done?'checked':''}">${done?'✓':''}</div>
          <div style="flex:1">
            <div class="task-text">${esc(task.task)}</div>
            <div class="task-tags">
              ${task.time?`<span class="tag tag-time">🕐 ${esc(task.time)}</span>`:''}
              <span class="tag" style="color:${cs.color};background:${cs.bg};border:1px solid ${cs.border}30">${cs.label}</span>
            </div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
  } else {
    html+=`<div class="empty-state">
      <div class="icon">📋</div>
      <h3>Planning détaillé à compléter</h3>
      <p>Le détail jour par jour de cette semaine sera construit à l'approche de la phase. Les objectifs et livrables sont définis ci-dessus. Utilisez les notes ci-dessous pour planifier.</p>
    </div>`;
  }

  // Notes section
  const noteVal = notes[selectedWeek] || '';
  html+=`<div class="notes-section">
    <label>📝 Notes & observations — Semaine ${w.week}</label>
    <textarea placeholder="Ajoutez vos notes, observations, résultats, liens utiles..." oninput="updateNote(${selectedWeek},this.value)">${esc(noteVal)}</textarea>
  </div>`;

  html+=`</div></div>

  <div class="legend">`;
  for(const [k,v] of Object.entries(CATS)){
    html+=`<span class="legend-item" style="background:${v.bg};border-color:${v.border}40;color:${v.color}">${v.label}</span>`;
  }
  html+=`</div>

  <div class="actions-bar">
    <button class="btn btn-export" onclick="exportData()">📥 Exporter la progression</button>
    <button class="btn btn-danger" onclick="resetAll()">🗑️ Réinitialiser</button>
  </div>

  <p class="footer-note">
    Cliquer sur une tâche pour la marquer comme terminée · Les notes sont sauvegardées localement<br>
    ADN de Recherche v2.1 — A. Yvan GUIFO FODJO · Été–Automne 2026 · ICSE 2027 NIER Deadline : 23 octobre 2026 · Journée bornée à 18h
  </p>`;

  document.getElementById('app').innerHTML = html;
}

render();
</script>
</body>
</html>
